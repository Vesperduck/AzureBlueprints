name: Bump version on PR

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-bump-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bump:
    # Only run for PRs from the same repo (not forks)
    # Skip if the actor is github-actions[bot] to prevent infinite loops
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine bump type from labels
        id: bump
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | tr -d '[]"' | tr ',' ' ')
          if echo "$LABELS" | grep -qw "release:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qw "release:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and push to PR branch
        run: |
          set -euo pipefail

          # Skip if the latest commit is already a version bump to prevent loops
          if git log -1 --pretty=%B | grep -q "^chore: bump version to v"; then
            echo "Latest commit is already a version bump; skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          git add package.json package-lock.json
          git commit -m "chore: bump version to v${VERSION} [skip ci]"

          git push origin HEAD:${{ github.event.pull_request.head.ref }}
