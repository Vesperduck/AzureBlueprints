name: Release on PR Merge

on:
  pull_request_target:
    types: [closed]
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build VSIX, tag, and push tag
        id: build
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")

          # Fail fast if this version tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists. Bump the version before merging."
            exit 1
          fi

          npx @vscode/vsce@3.3.2 package --no-dependencies

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.build.outputs.version }}
          name: v${{ steps.build.outputs.version }}
          target_commitish: ${{ steps.build.outputs.sha }}
          generate_release_notes: true
          files: "*.vsix"
